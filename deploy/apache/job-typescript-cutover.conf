# Final cutover configuration. Include this inside the existing TLS virtual host
# only after the PHP queue count is zero and the acceptance checklist passes.
ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"
ProxyPass        / http://127.0.0.1:3000/ retry=0 flushpackets=on timeout=300
ProxyPassReverse / http://127.0.0.1:3000/
