# Load proxy, proxy_http, headers, and rewrite before including this file.
# PHP remains the default handler while route groups are enabled in order.

ProxyPreserveHost On
ProxyPass        /_next/ http://127.0.0.1:3000/_next/ retry=0
ProxyPassReverse /_next/ http://127.0.0.1:3000/_next/
ProxyPass        /__ts/ http://127.0.0.1:3000/__ts/ retry=0
ProxyPassReverse /__ts/ http://127.0.0.1:3000/__ts/

